services:
  web:
    build: ./php
    container_name: celeste_web
    ports:
      - "8080:80"
    volumes:
      - ./prestashop:/var/www/html
    depends_on:
      - db
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    networks:
      - celeste_network

  db:
    image: mysql:8.0
    container_name: celeste_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: celeste_root
      MYSQL_DATABASE: celeste_db
      MYSQL_USER: celeste_user
      MYSQL_PASSWORD: celeste_pass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - celeste_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: celeste_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: celeste_root
    depends_on:
      - db
    networks:
      - celeste_network

volumes:
  db_data:

networks:
  celeste_network:
    driver: bridge